<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUMA Pilates — Certification Portal</title>
  <meta name="description" content="NUMA Pilates Certification Portal — Comprehensive Pilates teacher training program in Homestead, FL">
  <link rel="icon" type="image/png" href="numa-logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css?v=20260708c">
  <script>
    // When served from the same Railway host as the API, leave empty for same-origin requests.
    // If you ever host the portal elsewhere again, set this to your Railway URL.
    // Point at the Railway backend when the frontend is hosted elsewhere
    // (e.g. netlify.app). On Railway same-origin, leave empty.
    (function(){
      var h = window.location.hostname;
      if (h === 'localhost' || h === '127.0.0.1') {
        window.NUMA_API_BASE = 'http://localhost:3000';
      } else if (h.indexOf('railway.app') !== -1) {
        window.NUMA_API_BASE = '';
      } else {
        // Any other host (netlify, custom domain) — talk to Railway backend
        window.NUMA_API_BASE = 'https://numa-teacher-portal-production.up.railway.app';
      }
    })();
  </script>
</head>
<body>
  <div id="app">
    <!-- Loading state -->
    <div class="login-page" style="flex-direction:column;gap:16px;">
      <img src="numa-logo.png" alt="NUMA Reformer Pilates" style="width:180px;height:auto;">
      <p style="font-size:12px;color:#8A7F7A;">Loading certification portal...</p>
    </div>
  </div>

  <script src="content.js?v=20260708c"></script>
  <script src="app.js?v=20260708c"></script>
</body>
</html>
